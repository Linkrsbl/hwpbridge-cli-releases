<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HwpBridge CLI 로그인</title>
  <style>
    :root {
      --bg: #f7f7f8;
      --surface: #ffffff;
      --text: #111827;
      --muted: #4b5563;
      --border: #e5e7eb;
      --primary: #2563eb;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: Segoe UI, Noto Sans KR, Arial, sans-serif;
    }
    .card {
      width: min(560px, calc(100vw - 32px));
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 28px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 24px;
    }
    p {
      margin: 0 0 12px;
      line-height: 1.6;
      color: var(--muted);
    }
    code {
      word-break: break-all;
      background: #f3f4f6;
      padding: 2px 6px;
      border-radius: 6px;
    }
    .hidden { display: none; }
    .status { margin-top: 16px; }
    .ok { color: #047857; }
    .err { color: #b91c1c; }
    .button {
      display: inline-block;
      margin-top: 4px;
      color: white;
      background: var(--primary);
      text-decoration: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>HwpBridge CLI 로그인</h1>
    <p id="summary">로그인을 마무리하고 있습니다...</p>
    <p id="detail">로컬 HwpBridge CLI로 로그인 정보를 전달하는 중입니다.</p>
    <p id="manual" class="hidden">
      자동 연결이 완료되지 않으면, 이 페이지의 전체 주소를 복사해서
      <code>hwpbridge auth import-url --url "&lt;url&gt;"</code>
      를 실행해 주세요.
    </p>
    <p id="target" class="status"></p>
    <p id="close-help" class="hidden">
      터미널에 로그인 성공이 표시되면 이 페이지는 닫아도 됩니다.
    </p>
    <p id="external-help" class="hidden">
      브라우저가 자동으로 프로그램을 열지 못하면 아래 버튼을 눌러 주세요.
    </p>
    <p>
      <a id="handoff-link" class="button hidden" href="#">HwpBridge CLI 열기</a>
    </p>
  </div>

  <script>
    const hash = window.location.hash.startsWith('#') ? window.location.hash.slice(1) : '';
    const summary = document.getElementById('summary');
    const detail = document.getElementById('detail');
    const manual = document.getElementById('manual');
    const target = document.getElementById('target');
    const closeHelp = document.getElementById('close-help');
    const externalHelp = document.getElementById('external-help');
    const handoffLink = document.getElementById('handoff-link');
    const handoffBase = 'hwpbridge-cli://callback';

    if (!hash || !hash.includes('access_token=')) {
      summary.textContent = '로그인을 자동으로 완료하지 못했습니다.';
      detail.textContent = '리다이렉트 페이지에서 로그인 토큰을 받지 못했습니다.';
      target.textContent = '필요하면 이 페이지의 전체 주소를 복사해 auth import-url로 직접 가져올 수 있습니다.';
      target.className = 'status err';
      manual.classList.remove('hidden');
    } else {
      const params = new URLSearchParams(hash);
      const allowedKeys = ['access_token', 'refresh_token', 'expires_at', 'expires_in', 'token_type'];
      const handoff = new URL(handoffBase);
      allowedKeys.forEach((key) => {
        const value = params.get(key);
        if (value) {
          handoff.searchParams.set(key, value);
        }
      });

      handoffLink.href = handoff.toString();
      handoffLink.classList.remove('hidden');
      externalHelp.classList.remove('hidden');
      closeHelp.classList.remove('hidden');
      target.textContent = `로컬 HwpBridge CLI를 여는 중입니다: ${handoffBase}`;
      target.className = 'status ok';
      summary.textContent = '로그인 정보를 HwpBridge CLI로 전달하고 있습니다.';
      detail.textContent = '브라우저가 잠깐 PowerShell 창을 열 수 있습니다. 터미널에 성공 메시지가 보이면 이 페이지를 닫아도 됩니다.';
      setTimeout(() => window.location.replace(handoff.toString()), 50);
    }
  </script>
</body>
</html>
